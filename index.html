<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Travel Planner</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Hero Banner -->
<div class="hero-banner">
  <div class="hero-text">
    <h1>Travel Planner</h1>
    <p>Plan your next adventure</p>
  </div>
</div>

<!-- Main Container -->
<div class="container">

  <!-- Input Card -->
  <div class="input-card">

    <h2>Add New Trip</h2>

    <div class="input-group">
      <input type="date" id="date">
      <input id="day" placeholder="Day (e.g. 1)">
      <input id="location" placeholder="Location">
      <input id="detail" placeholder="Detail">
      <button onclick="addTrip()">Add</button>
    </div>

  </div>

  <!-- Table -->
  <div class="table-card">

    <h2>Your Trips</h2>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Day</th>
          <th>Location</th>
          <th>Detail</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="tripList"></tbody>

    </table>

  </div>

</div>

<script src="script.js"></script>

</body>

</html>
