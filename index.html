<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Travel Planner</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Travel Planner</h1>

<input type="date" id="date">
<input id="day" placeholder="Day">
<input id="location" placeholder="Location">
<input id="detail" placeholder="Detail">

<button onclick="addTrip()">Add</button>

<table border="1">

<thead>
<tr>
<th>Date</th>
<th>Day</th>
<th>Location</th>
<th>Detail</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tripList"></tbody>

</table>

<script src="script.js"></script>

</body>

</html>
