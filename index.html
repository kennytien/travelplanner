<h1>Travel Planner</h1>

<div class="input-area">

<input id="date" type="date">

<input id="day" placeholder="Day">

<input id="place" placeholder="Location">

<input id="detail" placeholder="Detail plan">

<button onclick="addTrip()">Add</button>

</div>


<table id="tripTable">

<thead>
<tr>
<th>Date</th>
<th>Day</th>
<th>Location</th>
<th>Detail</th>
<th>Action</th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>
